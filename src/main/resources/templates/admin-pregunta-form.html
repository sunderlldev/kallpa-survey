<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title th:text="${modo == 'editar'} ? 'Editar pregunta' : 'Nueva pregunta'">Pregunta</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
		}

		body {
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 24px;
		}

		.card {
			width: 100%;
			max-width: 580px;
			background: white;
			border-radius: 18px;
			padding: 32px;
			box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
		}

		.card h1 {
			font-size: 22px;
			color: #111827;
			margin-bottom: 4px;
		}

		.simulacion-label {
			font-size: 13px;
			color: #6b7280;
			margin-bottom: 24px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			font-size: 13px;
			font-weight: bold;
			color: #374151;
			margin-bottom: 6px;
		}

		.form-group input {
			width: 100%;
			padding: 11px 14px;
			border: 1px solid #d1d5db;
			border-radius: 10px;
			font-size: 14px;
			outline: none;
			transition: border-color 0.2s;
		}

		.form-group input:focus {
			border-color: #2563eb;
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
		}

		.form-group .hint {
			font-size: 12px;
			color: #9ca3af;
			margin-top: 4px;
		}

		.orden-info {
			background: #eff6ff;
			border: 1px solid #bfdbfe;
			border-radius: 10px;
			padding: 12px 16px;
			font-size: 13px;
			color: #1d4ed8;
			margin-bottom: 24px;
		}

		.btn {
			width: 100%;
			padding: 13px;
			border: none;
			border-radius: 10px;
			font-size: 15px;
			font-weight: bold;
			cursor: pointer;
			transition: background 0.2s;
		}

		.btn-primary {
			background: #2563eb;
			color: white;
		}

		.btn-primary:hover {
			background: #1d4ed8;
		}

		.btn-secondary {
			display: block;
			text-align: center;
			margin-top: 12px;
			padding: 12px;
			background: #f3f4f6;
			color: #374151;
			text-decoration: none;
			border-radius: 10px;
			font-weight: bold;
			font-size: 14px;
		}

		.btn-secondary:hover {
			background: #e5e7eb;
		}
	</style>
</head>

<body>
	<div class="card">
		<h1 th:text="${modo == 'editar'} ? 'Editar pregunta' : 'Nueva pregunta'">Pregunta</h1>
		<p class="simulacion-label" th:text="'Simulación: ' + ${simulacion.titulo}">Simulación</p>

		<div class="orden-info" th:if="${modo != 'editar'}">
			El orden se asigna automáticamente. La pregunta con menor orden será la primera en mostrarse.
		</div>

		<form th:action="${modo == 'editar'}
			? @{'/admin/pregunta/' + ${pregunta.idPregunta} + '/actualizar'}
			: @{'/admin/simulacion/' + ${simulacion.idSimulacion} + '/preguntas/guardar'}" method="post">

			<div class="form-group">
				<label>Texto de la pregunta</label>
				<input type="text" name="texto" th:value="${pregunta.texto}" required
					placeholder="Ej: ¿Qué valoras más al comprar una tablet?">
			</div>

			<div class="form-group">
				<label>Orden</label>
				<input type="number" name="orden" min="1" th:value="${pregunta.orden != null ? pregunta.orden : ''}"
					placeholder="Se asigna automáticamente si lo dejas vacío">
				<p class="hint">La pregunta con orden 1 (o el menor número) será la inicial. Si dos preguntas tienen el
					mismo orden, se usa el ID como desempate.</p>
			</div>

			<button class="btn btn-primary" type="submit"
				th:text="${modo == 'editar'} ? 'Actualizar pregunta' : 'Guardar pregunta'">
				Guardar
			</button>
		</form>

		<a th:href="@{'/admin/simulacion/' + ${simulacion.idSimulacion} + '/preguntas'}" class="btn-secondary">
			← Volver
		</a>
	</div>

	<div th:replace="~{fragments/watson-widget :: widget}"></div>
</body>

</html>
