<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Login</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.card {
			width: 100%;
			max-width: 420px;
			background: #ffffff;
			padding: 32px;
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
		}

		.title {
			margin: 0 0 8px;
			font-size: 32px;
			color: #111827;
			text-align: center;
		}

		.subtitle {
			margin: 0 0 24px;
			text-align: center;
			color: #6b7280;
			font-size: 14px;
		}

		.alert {
			padding: 12px 14px;
			border-radius: 10px;
			margin-bottom: 16px;
			font-size: 14px;
		}

		.alert-error {
			background: #fee2e2;
			color: #991b1b;
		}

		.alert-success {
			background: #dcfce7;
			color: #166534;
		}

		.form-group {
			margin-bottom: 18px;
		}

		label {
			display: block;
			margin-bottom: 8px;
			color: #374151;
			font-weight: bold;
			font-size: 14px;
		}

		input {
			width: 100%;
			padding: 12px;
			border: 1px solid #d1d5db;
			border-radius: 10px;
			font-size: 14px;
			outline: none;
		}

		input:focus {
			border-color: #2563eb;
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
		}

		.btn {
			width: 100%;
			padding: 12px;
			background: #2563eb;
			color: white;
			border: none;
			border-radius: 10px;
			font-size: 15px;
			font-weight: bold;
			cursor: pointer;
			transition: 0.2s ease;
		}

		.btn:hover {
			background: #1d4ed8;
		}

		.footer-link {
			text-align: center;
			margin-top: 18px;
			font-size: 14px;
		}

		.footer-link a {
			color: #2563eb;
			text-decoration: none;
			font-weight: bold;
		}

		.footer-link a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<div class="card">
		<h1 class="title">Iniciar sesión</h1>
		<p class="subtitle">Accede al simulador de decisiones</p>

		<div th:if="${param.error}" class="alert alert-error">
			Correo o contraseña incorrectos.
		</div>

		<div th:if="${param.registroExitoso}" class="alert alert-success">
			Registro exitoso. Ahora puedes iniciar sesión.
		</div>

		<form th:action="@{/login}" method="post">
			<div class="form-group">
				<label for="correo">Correo institucional</label>
				<input type="email" id="correo" name="correo" placeholder="usuario@cibertec.edu.pe" required>
			</div>

			<div class="form-group">
				<label for="password">Contraseña</label>
				<input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
			</div>

			<button type="submit" class="btn">Ingresar</button>
		</form>

		<div class="footer-link">
			¿No tienes cuenta? <a href="/registro">Crear cuenta</a>
		</div>
	</div>

	<div th:replace="~{fragments/watson-widget :: widget}"></div>

</body>

</html>
