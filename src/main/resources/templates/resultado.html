<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Resultado</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
		}

		body {
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 24px;
		}

		.card {
			width: 100%;
			max-width: 680px;
			background: white;
			border-radius: 20px;
			padding: 40px;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
			text-align: center;
		}

		.icon {
			font-size: 56px;
			margin-bottom: 16px;
		}

		.title {
			font-size: 28px;
			color: #111827;
			margin-bottom: 8px;
		}

		.perfil-badge {
			display: inline-block;
			padding: 8px 20px;
			border-radius: 999px;
			font-size: 15px;
			font-weight: bold;
			color: white;
			margin-bottom: 24px;
		}

		.score-box {
			background: #f8faff;
			border: 2px solid #e0e7ff;
			padding: 20px;
			border-radius: 14px;
			margin-bottom: 24px;
		}

		.score-box p {
			font-size: 14px;
			color: #6b7280;
			margin-bottom: 4px;
		}

		.score-box strong {
			font-size: 52px;
			font-weight: bold;
			color: #2563eb;
		}

		.message {
			font-size: 16px;
			color: #374151;
			line-height: 1.7;
			background: #f9fafb;
			padding: 20px;
			border-radius: 12px;
			margin-bottom: 28px;
			text-align: left;
		}

		.actions {
			display: flex;
			gap: 12px;
			justify-content: center;
		}

		.btn {
			display: inline-block;
			padding: 12px 24px;
			border-radius: 10px;
			font-size: 15px;
			font-weight: bold;
			text-decoration: none;
			transition: 0.2s;
		}

		.btn-primary {
			background: #2563eb;
			color: white;
		}

		.btn-primary:hover {
			background: #1d4ed8;
		}

		.btn-secondary {
			background: #f3f4f6;
			color: #374151;
		}

		.btn-secondary:hover {
			background: #e5e7eb;
		}
	</style>
</head>

		</div>

		<h1 class="title">Resultado de tu simulación</h1>

		<span class="perfil-badge" th:style="'background:' + ${color}" th:text="${perfil}">
			Perfil
		</span>

		<div class="score-box">
			<p>Puntaje total obtenido</p>
			<strong th:text="${puntajeTotal}">0</strong>
		</div>

		<p class="message" th:text="${mensaje}">Mensaje personalizado.</p>

		<div class="actions">
			<a class="btn btn-secondary" href="/simulacion">Ver otras simulaciones</a>
			<a class="btn btn-primary" href="/logout">Finalizar sesión</a>
		</div>
	</div>

	<div th:replace="~{fragments/watson-widget :: widget}"></div>
</body>

</html>
