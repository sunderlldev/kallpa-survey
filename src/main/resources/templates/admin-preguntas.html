<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Preguntas</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
		}

		body {
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			min-height: 100vh;
			padding: 30px 20px;
		}

		.container {
			max-width: 1100px;
			margin: 0 auto;
		}

		.box {
			background: white;
			border-radius: 16px;
			padding: 24px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
			margin-bottom: 20px;
		}

		.box h1 {
			font-size: 22px;
			color: #111827;
			margin-bottom: 4px;
		}

		.box p {
			font-size: 13px;
			color: #6b7280;
			margin-bottom: 16px;
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.btn {
			display: inline-block;
			padding: 9px 16px;
			border-radius: 8px;
			font-size: 13px;
			font-weight: bold;
			text-decoration: none;
			cursor: pointer;
			border: none;
		}

		.btn-primary {
			background: #2563eb;
			color: white;
		}

		.btn-primary:hover {
			background: #1d4ed8;
		}

		.btn-secondary {
			background: #f3f4f6;
			color: #374151;
			border: 1px solid #d1d5db;
		}

		.btn-secondary:hover {
			background: #e5e7eb;
		}

		.btn-success {
			background: #dcfce7;
			color: #166534;
			border: 1px solid #bbf7d0;
		}

		.btn-success:hover {
			background: #bbf7d0;
		}

		.btn-danger {
			background: #fee2e2;
			color: #dc2626;
		}

		.btn-danger:hover {
			background: #fecaca;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 12px 14px;
			border-bottom: 1px solid #e5e7eb;
			text-align: left;
			font-size: 14px;
		}

		th {
			background: #f9fafb;
			color: #374151;
			font-weight: bold;
		}

		.badge-inicial {
			display: inline-block;
			background: #eff6ff;
			color: #1d4ed8;
			font-size: 11px;
			padding: 2px 8px;
			border-radius: 999px;
			font-weight: bold;
		}

		.td-actions {
			display: flex;
			gap: 8px;
		}

		.empty {
			text-align: center;
			color: #9ca3af;
			padding: 32px;
		}
	</style>
</head>

<body>
	<div class="container">

		<div class="box">
			<h1 th:text="'Preguntas de: ' + ${simulacion.titulo}">Preguntas</h1>
			<p th:text="${simulacion.descripcion}">Descripción</p>

			<div class="actions">
				<a class="btn btn-primary"
					th:href="@{'/admin/simulacion/' + ${simulacion.idSimulacion} + '/preguntas/nueva'}">
					+ Nueva pregunta
				</a>
				<a class="btn btn-success" th:href="@{'/admin/simulacion/' + ${simulacion.idSimulacion} + '/perfiles'}">
					Perfiles de resultado
				</a>
				<a class="btn btn-secondary" href="/admin/dashboard">← Dashboard</a>
			</div>
		</div>

		<div class="box">
			<div th:if="${#lists.isEmpty(preguntas)}" class="empty">
				No hay preguntas aún. Crea la primera para comenzar el flujo.
			</div>

			<table th:unless="${#lists.isEmpty(preguntas)}">
				<thead>
					<tr>
						<th>Orden</th>
						<th>Texto</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="preg, iter : ${preguntas}">
						<td th:text="${preg.orden}">1</td>
						<td>
							<span th:text="${preg.texto}">Texto</span>
							<span th:if="${iter.first}" class="badge-inicial">Inicial</span>
						</td>
						<td>
							<span th:if="${preg.estado}" style="color:#16a34a; font-size:13px;">● Activa</span>
						</td>
						<td>
							<div class="td-actions">
								<a class="btn btn-secondary"
									th:href="@{'/admin/pregunta/' + ${preg.idPregunta} + '/alternativas'}">
									Alternativas
								</a>
								<a class="btn btn-secondary"
									th:href="@{'/admin/pregunta/' + ${preg.idPregunta} + '/editar'}">
									Editar
								</a>
								<a class="btn btn-danger"
									th:href="@{'/admin/pregunta/' + ${preg.idPregunta} + '/desactivar'}"
									onclick="return confirm('¿Desactivar esta pregunta?')">
									Desactivar
								</a>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

	<div th:replace="~{fragments/watson-widget :: widget}"></div>
</body>

</html>
