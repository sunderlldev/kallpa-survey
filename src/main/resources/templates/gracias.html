<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>¡Gracias!</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: #121212;
			color: #e0e0e0;
			height: 100vh;
			display: flex;
			align-items: center;
		}

		.card {
			background-color: #1e1e1e;
			border: none;
			width: 100%;
			max-width: 400px;
			margin: auto;
		}
	</style>
</head>

<body>
	<div class="card shadow p-4 text-center">
		<div class="mb-3" style="font-size: 3rem;">
			<svg xmlns="http://www.w3.org/2000/svg" fill="white" width="48" height="48" viewBox="0 0 24 24">
				<path d="M20.285 2l-11.285 11.567-5.286-5.011-3.714 3.716 9 8.728 15-15.285z" />
			</svg>
		</div>
		<h3 class="text-white mb-2">¡Gracias por tu respuesta!</h3>
		<p class="text-secondary">Tu opinión nos ayuda a mejorar.</p>
		<a th:href="@{/preguntas}" class="btn btn-outline-light mt-3">Responder otra vez</a>
	</div>
	
	<div th:replace="~{fragments/watson-widget :: widget}"></div>
</body>

</html>
