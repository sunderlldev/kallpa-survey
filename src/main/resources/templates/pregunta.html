<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Pregunta</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 24px;
		}

		.card {
			width: 100%;
			max-width: 760px;
			background: white;
			border-radius: 18px;
			padding: 32px;
			box-shadow: 0 12px 35px rgba(0, 0, 0, 0.24);
		}

		.badge {
			display: inline-block;
			background: #eff6ff;
			color: #1d4ed8;
			padding: 10px 14px;
			border-radius: 999px;
			font-size: 14px;
			font-weight: bold;
			margin-bottom: 20px;
		}

		.question {
			font-size: 30px;
			color: #111827;
			margin: 0 0 24px;
			line-height: 1.3;
		}

		.options {
			display: flex;
			flex-direction: column;
			gap: 14px;
			margin-bottom: 24px;
		}

		.option {
			border: 1px solid #d1d5db;
			border-radius: 12px;
			padding: 16px;
			transition: 0.2s ease;
			cursor: pointer;
		}

		.option:hover {
			border-color: #2563eb;
			background: #f8fbff;
		}

		.option input {
			margin-right: 10px;
		}

		.option span {
			font-size: 16px;
			color: #1f2937;
		}

		.btn {
			width: 100%;
			padding: 14px;
			border: none;
			border-radius: 12px;
			background: #2563eb;
			color: white;
			font-size: 16px;
			font-weight: bold;
			cursor: pointer;
			transition: 0.2s ease;
		}

		.btn:hover {
			background: #1d4ed8;
		}
	</style>
</head>

<body>
	<div class="card">
		<div class="badge">
			Puntaje acumulado: <span th:text="${puntajeTotal}">0</span>
		</div>

		<h2 class="question" th:text="${pregunta.texto}">
			Texto de la pregunta
		</h2>

		<form th:action="@{/simulacion/responder}" method="post">
			<div class="options">
				<label class="option" th:each="alt : ${alternativas}">
					<input type="radio" name="idAlternativa" th:value="${alt.idAlternativa}" required>
					<span th:text="${alt.texto}">Texto de alternativa</span>
				</label>
			</div>

			<button type="submit" class="btn">Responder</button>
		</form>
	</div>

	<div th:replace="~{fragments/watson-widget :: widget}"></div>

</body>

</html>
