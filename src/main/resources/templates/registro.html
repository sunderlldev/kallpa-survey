<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Registro</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: Arial, sans-serif;
		}

		body {
			margin: 0;
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.card {
			width: 100%;
			max-width: 480px;
			background: #ffffff;
			padding: 32px;
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
		}

		.title {
			margin: 0 0 8px;
			font-size: 30px;
			color: #111827;
			text-align: center;
		}

		.subtitle {
			margin: 0 0 24px;
			text-align: center;
			color: #6b7280;
			font-size: 14px;
		}

		.alert {
			padding: 12px 14px;
			border-radius: 10px;
			margin-bottom: 16px;
			font-size: 14px;
		}

		.alert-error {
			background: #fee2e2;
			color: #991b1b;
		}

		.form-group {
			margin-bottom: 18px;
		}

		label {
			display: block;
			margin-bottom: 8px;
			color: #374151;
			font-weight: bold;
			font-size: 14px;
		}

		input {
			width: 100%;
			padding: 12px;
			border: 1px solid #d1d5db;
			border-radius: 10px;
			font-size: 14px;
			outline: none;
		}

		input:focus {
			border-color: #2563eb;
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
		}

		.help {
			margin-top: 6px;
			color: #6b7280;
			font-size: 12px;
		}

		.btn {
			width: 100%;
			padding: 12px;
			background: #2563eb;
			color: white;
			border: none;
			border-radius: 10px;
			font-size: 15px;
			font-weight: bold;
			cursor: pointer;
			transition: 0.2s ease;
		}

		.btn:hover {
			background: #1d4ed8;
		}

		.footer-link {
			text-align: center;
			margin-top: 18px;
			font-size: 14px;
		}

		.footer-link a {
			color: #2563eb;
			text-decoration: none;
			font-weight: bold;
		}

		.footer-link a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<div class="card">
		<h1 class="title">Registro de usuario</h1>
		<p class="subtitle">Crea tu cuenta para acceder al simulador</p>

		<div th:if="${param.errorCorreo}" class="alert alert-error">
			Solo se permiten correos institucionales de Cibertec.
		</div>

		<div th:if="${param.correoExiste}" class="alert alert-error">
			Ese correo ya está registrado.
		</div>

		<div th:if="${param.errorRol}" class="alert alert-error">
			No se encontró el rol USUARIO en la base de datos.
		</div>

		<form th:action="@{/registro}" method="post">
			<div class="form-group">
				<label for="nombre">Nombre</label>
				<input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
			</div>

			<div class="form-group">
				<label for="apellido">Apellido</label>
				<input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required>
			</div>

			<div class="form-group">
				<label for="correo">Correo institucional</label>
				<input type="email" id="correo" name="correo" placeholder="usuario@cibertec.edu.pe" required>
				<div class="help">Solo se aceptan correos con dominio @cibertec.edu.pe</div>
			</div>

			<div class="form-group">
				<label for="password">Contraseña</label>
				<input type="password" id="password" name="password" placeholder="Crea una contraseña" required>
			</div>

			<button type="submit" class="btn">Registrarse</button>
		</form>

		<div class="footer-link">
			¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a>
		</div>
	</div>

	<div th:replace="~{fragments/watson-widget :: widget}"></div>
</body>

</html>
